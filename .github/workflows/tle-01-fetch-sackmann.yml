name: TLE 01 Fetch Sackmann Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-sackmann:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch Sackmann CSV files
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m tle_machine.fetch_sackmann_data

      - name: Show fetched files
        run: |
          find data/raw/sackmann -type f | sort

      - name: Commit raw Sackmann data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/sackmann data/reports/sackmann
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Fetch Sackmann data"
          git push
