name: TLE 10 Audit API Player Mapping

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-api-player-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Audit API player mapping
        run: |
          python -m tle_machine.audit_api_player_mapping

      - name: Commit API player mapping audit
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/reports/api_tennis/player_mapping_audit.json || true
          git add data/reports/api_tennis/player_mapping_audit_issues.csv || true
          git add data/reports/api_tennis/player_mapping_match_coverage.csv || true
          git add data/reports/api_tennis/player_mapping_unmapped_impact.csv || true

          if git diff --cached --quiet; then
            echo "No player mapping audit changes to commit."
          else
            git commit -m "Audit API player mapping"
            git push
          fi
