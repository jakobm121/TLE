name: TLE 08 Audit API Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-api-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Audit API source
        run: |
          python -m tle_machine.audit_api_source

      - name: Commit API audit reports
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/reports/api_tennis/api_source_audit.json || true
          git add data/reports/api_tennis/api_source_issues.csv || true
          git add data/reports/api_tennis/api_sackmann_overlap_candidates.csv || true

          if git diff --cached --quiet; then
            echo "No API audit report changes to commit."
          else
            git commit -m "Audit API tennis source"
            git push
          fi
