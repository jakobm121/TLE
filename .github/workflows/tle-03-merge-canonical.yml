name: TLE 03 Merge Canonical

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-canonical:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Merge canonical database
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m tle_machine.merge_canonical

      - name: Show canonical manifest
        run: |
          cat data/canonical/manifest.json || true

      - name: Commit canonical database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/canonical data/reports
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Merge canonical database"
          git push
