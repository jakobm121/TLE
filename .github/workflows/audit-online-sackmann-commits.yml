name: Audit Online Sackmann Commits

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check latest Sackmann commits
        run: |
          echo "ATP latest commit:"
          curl -L https://api.github.com/repos/JeffSackmann/tennis_atp/commits?per_page=1

          echo ""
          echo "WTA latest commit:"
          curl -L https://api.github.com/repos/JeffSackmann/tennis_wta/commits?per_page=1
