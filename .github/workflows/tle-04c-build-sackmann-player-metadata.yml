name: TLE 04c Build Sackmann Player Metadata

on:
  workflow_dispatch:
    inputs:
      refresh:
        description: "Refresh Sackmann player CSV files from external repos"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  build-sackmann-player-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TLE repo
        uses: actions/checkout@v4
        with:
          path: TLE

      - name: Checkout Sackmann ATP repo
        uses: actions/checkout@v4
        with:
          repository: JeffSackmann/tennis_atp
          path: sackmann_atp

      - name: Checkout Sackmann WTA repo
        uses: actions/checkout@v4
        with:
          repository: JeffSackmann/tennis_wta
          path: sackmann_wta

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Copy Sackmann player CSV files
        run: |
          mkdir -p TLE/data/raw/sackmann
          cp sackmann_atp/atp_players.csv TLE/data/raw/sackmann/atp_players.csv
          cp sackmann_wta/wta_players.csv TLE/data/raw/sackmann/wta_players.csv

          echo "ATP players:"
          head -n 2 TLE/data/raw/sackmann/atp_players.csv
          echo "WTA players:"
          head -n 2 TLE/data/raw/sackmann/wta_players.csv

      - name: Build Sackmann player metadata
        working-directory: TLE
        run: |
          python -m tle_machine.build_sackmann_player_metadata

      - name: Commit Sackmann player metadata
        working-directory: TLE
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/raw/sackmann/atp_players.csv || true
          git add data/raw/sackmann/wta_players.csv || true
          git add data/metadata/sackmann/players.json || true
          git add data/reports/sackmann/player_metadata_report.json || true

          if git diff --cached --quiet; then
            echo "No Sackmann player metadata changes to commit."
          else
            git commit -m "Build Sackmann player metadata"
            git push
          fi
