name: Elo Standalone 01 Predictions

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Scan date YYYY-MM-DD, empty = today Europe/Ljubljana"
        required: false
        default: ""
      days_ahead:
        description: "Number of days to scan"
        required: false
        default: "1"
      include_no_bet:
        description: "Include NO_BET rows in scan report only"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  elo-standalone-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TLE repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build standalone Elo predictions
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.include_no_bet }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --include-no-bet"
          fi

          python -m tle_machine.elo_standalone_predictions \
            --days-ahead "${{ github.event.inputs.days_ahead }}" \
            --min-start-minutes 30 \
            $EXTRA_ARGS

      - name: Commit standalone Elo predictions
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/elo_standalone/predictions.json || true
          git add data/elo_standalone/results.json || true
          git add data/elo_standalone/active_predictions.csv || true
          git add data/reports/elo_standalone/predictions_report.json || true
          git add data/reports/elo_standalone/unresolved_surface_report.json || true
          git add data/metadata/tournament_surface_map.json || true

          if git diff --cached --quiet; then
            echo "No standalone Elo prediction changes to commit."
          else
            git commit -m "Update standalone Elo predictions"
            git push
          fi
