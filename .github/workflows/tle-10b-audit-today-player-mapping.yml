name: TLE 10b Audit Today Player Mapping

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date YYYY-MM-DD, empty = today UTC"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  audit-today-player-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Audit today player mapping
        run: |
          if [ -z "${{ github.event.inputs.date }}" ]; then
            python -m tle_machine.audit_today_player_mapping --source-fallback
          else
            python -m tle_machine.audit_today_player_mapping --date "${{ github.event.inputs.date }}" --source-fallback
          fi

      - name: Commit today mapping audit
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/reports/api_tennis/today_mapping_audit.json || true
          git add data/reports/api_tennis/today_mapping_review.csv || true
          git add data/reports/api_tennis/today_mapping_audit_*.json || true
          git add data/reports/api_tennis/today_mapping_review_*.csv || true

          if git diff --cached --quiet; then
            echo "No today mapping audit changes to commit."
          else
            git commit -m "Audit today API player mapping"
            git push
          fi
