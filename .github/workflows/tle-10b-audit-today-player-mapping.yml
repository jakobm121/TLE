name: TLE 10b Audit Today Player Mapping

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional date YYYY-MM-DD. Empty = today / latest raw API data"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  audit-today-player-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit today player mapping
        run: |
          ARGS=""

          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi

          python -m tle_machine.audit_today_player_mapping $ARGS

      - name: Commit today mapping audit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/reports/api_tennis/today_mapping_audit.json || true
          git add data/reports/api_tennis/today_mapping_audit_*.json || true

          git add data/reports/api_tennis/today_mapping_review.csv || true
          git add data/reports/api_tennis/today_mapping_review_*.csv || true

          git add data/reports/api_tennis/today_mapping_no_candidates.csv || true
          git add data/reports/api_tennis/today_mapping_no_candidates_*.csv || true

          if git diff --cached --quiet; then
            echo "No today mapping audit changes to commit."
          else
            git commit -m "Audit today API player mapping"
            git push
          fi
