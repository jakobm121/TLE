name: TLE 10i Apply Today Mapping Review

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only; do not update overrides"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  apply-today-mapping-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply today mapping review
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python -m tle_machine.apply_today_mapping_review $ARGS

      - name: Commit applied mapping review
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/metadata/api_tennis/player_mapping_overrides.json || true
          git add data/reports/api_tennis/apply_today_mapping_review_report.json || true
          git add data/reports/api_tennis/apply_today_mapping_review_applied.csv || true

          if git diff --cached --quiet; then
            echo "No mapping review changes to commit."
          else
            git commit -m "Apply today mapping review"
            git push
          fi
