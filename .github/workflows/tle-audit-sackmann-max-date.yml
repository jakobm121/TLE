name: Audit Online Sackmann Max Date

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Download Sackmann repos as ZIP
        run: |
          curl -L -o /tmp/tennis_atp.zip https://github.com/JeffSackmann/tennis_atp/archive/refs/heads/master.zip
          curl -L -o /tmp/tennis_wta.zip https://github.com/JeffSackmann/tennis_wta/archive/refs/heads/master.zip

          unzip -q /tmp/tennis_atp.zip -d /tmp
          unzip -q /tmp/tennis_wta.zip -d /tmp

          ls -la /tmp
          ls -la /tmp/tennis_atp-master | head
          ls -la /tmp/tennis_wta-master | head

      - name: Audit online Sackmann max dates
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          FILES = {
              "atp_matches_2026": Path("/tmp/tennis_atp-master/atp_matches_2026.csv"),
              "atp_matches_qual_chall_2026": Path("/tmp/tennis_atp-master/atp_matches_qual_chall_2026.csv"),
              "atp_matches_futures_2026": Path("/tmp/tennis_atp-master/atp_matches_futures_2026.csv"),
              "wta_matches_2026": Path("/tmp/tennis_wta-master/wta_matches_2026.csv"),
              "wta_matches_qual_itf_2026": Path("/tmp/tennis_wta-master/wta_matches_qual_itf_2026.csv"),
          }

          def norm_date(d):
              d = str(d or "").strip()
              if len(d) == 8 and d.isdigit():
                  return f"{d[:4]}-{d[4:6]}-{d[6:8]}"
              return ""

          overall = None

          for name, path in FILES.items():
              if not path.exists():
                  print(f"{name}: MISSING {path}")
                  continue

              max_d = None
              rows = 0
              examples = []

              with path.open("r", encoding="utf-8", errors="replace", newline="") as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      d = norm_date(row.get("tourney_date"))
                      if not d:
                          continue

                      rows += 1
                      if max_d is None or d > max_d:
                          max_d = d
                          examples = [row]
                      elif d == max_d:
                          examples.append(row)
                          examples = examples[-5:]

                      if overall is None or d > overall:
                          overall = d

              print(f"{name}: max_date={max_d} rows={rows}")
              for r in examples[-5:]:
                  print("  max-row:", r.get("tourney_date"), r.get("tourney_name"), r.get("winner_name"), "-", r.get("loser_name"))
              print()

          print("ONLINE_SACKMANN_OVERALL_MAX_DATE:", overall)
          PY
