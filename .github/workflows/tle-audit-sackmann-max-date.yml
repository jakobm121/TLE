name: Audit Online Sackmann Max Date

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-online-sackmann:
    runs-on: ubuntu-latest

    steps:
      - name: Audit online Sackmann raw files
        run: |
          python - <<'PY'
          import csv
          import urllib.request
          from io import StringIO

          FILES = {
              "atp_matches_2026": "https://raw.githubusercontent.com/JeffSackmann/tennis_atp/master/atp_matches_2026.csv",
              "atp_matches_qual_chall_2026": "https://raw.githubusercontent.com/JeffSackmann/tennis_atp/master/atp_matches_qual_chall_2026.csv",
              "atp_matches_futures_2026": "https://raw.githubusercontent.com/JeffSackmann/tennis_atp/master/atp_matches_futures_2026.csv",
              "wta_matches_2026": "https://raw.githubusercontent.com/JeffSackmann/tennis_wta/master/wta_matches_2026.csv",
              "wta_matches_qual_itf_2026": "https://raw.githubusercontent.com/JeffSackmann/tennis_wta/master/wta_matches_qual_itf_2026.csv",
          }

          overall = None

          for name, url in FILES.items():
              try:
                  raw = urllib.request.urlopen(url, timeout=30).read().decode("utf-8", errors="replace")
                  reader = csv.DictReader(StringIO(raw))

                  max_d = None
                  rows = 0
                  last_rows = []

                  for row in reader:
                      d = str(row.get("tourney_date") or "").strip()
                      if len(d) == 8 and d.isdigit():
                          d_norm = f"{d[:4]}-{d[4:6]}-{d[6:8]}"
                      else:
                          d_norm = d

                      if d_norm:
                          rows += 1
                          if max_d is None or d_norm > max_d:
                              max_d = d_norm
                          if overall is None or d_norm > overall:
                              overall = d_norm

                      last_rows.append(row)
                      last_rows = last_rows[-3:]

                  print(f"{name}: max_date={max_d} rows={rows}")
                  for r in last_rows:
                      print("  last:", r.get("tourney_date"), r.get("tourney_name"), r.get("winner_name"), "-", r.get("loser_name"))
                  print()

              except Exception as e:
                  print(f"{name}: ERROR {e}")

          print("ONLINE_SACKMANN_OVERALL_MAX_DATE:", overall)
          PY
