name: TLE 06 Fetch API Results

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days back including today"
        required: false
        default: "21"
      skip_finalized_existing:
        description: "Skip older existing days where all fixtures are finalized"
        required: false
        default: "true"
      always_refresh_recent_days:
        description: "Always refresh today + recent days"
        required: false
        default: "2"

permissions:
  contents: write

jobs:
  fetch-api-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TLE repo
        uses: actions/checkout@v4

      - name: Pull latest main
        run: |
          git pull --ff-only

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch API results
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.skip_finalized_existing }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --skip-finalized-existing"
          fi

          python -m tle_machine.fetch_api_results \
            --days "${{ github.event.inputs.days }}" \
            --always-refresh-recent-days "${{ github.event.inputs.always_refresh_recent_days }}" \
            $EXTRA_ARGS

      - name: Commit API result raw files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/raw/api_tennis/results/*.json || true
          git add data/reports/api_tennis/fetch_api_results_report.json || true

          if git diff --cached --quiet; then
            echo "No API result changes to commit."
          else
            git commit -m "Fetch API tennis results"
            git push
          fi
