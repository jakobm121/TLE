name: TLE 06 Fetch API Results

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back including today"
        required: false
        default: "21"
      start_date:
        description: "Optional start date YYYY-MM-DD"
        required: false
        default: ""
      end_date:
        description: "Optional end date YYYY-MM-DD"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  fetch-api-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch API results
        env:
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
        run: |
          ARGS="--days ${{ github.event.inputs.days }}"
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            ARGS="$ARGS --start-date ${{ github.event.inputs.start_date }}"
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          python -m tle_machine.fetch_api_results $ARGS

      - name: Commit API raw results
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/raw/api_tennis/results/*.json || true
          git add data/reports/api_tennis/fetch_api_results_report.json || true

          if git diff --cached --quiet; then
            echo "No API fetch changes to commit."
          else
            git commit -m "Fetch API tennis results"
            git push
          fi
