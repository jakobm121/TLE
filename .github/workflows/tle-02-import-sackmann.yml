name: TLE 02 Import Sackmann History

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-sackmann:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Import Sackmann history
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m tle_machine.import_sackmann_history

      - name: Show source manifest
        run: |
          cat data/source/sackmann/manifest.json || true

      - name: Commit Sackmann source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source/sackmann data/reports/sackmann
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Import Sackmann history"
          git push
