name: TLE 10f Build Mapping Verification Queue

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mapping-verification-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build mapping verification queue
        run: |
          python -m tle_machine.build_mapping_verification_queue

      - name: Commit verification queue
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/reports/api_tennis/player_mapping_manual_verification_queue.csv || true
          git add data/reports/api_tennis/player_mapping_manual_verification_queue.json || true

          if git diff --cached --quiet; then
            echo "No verification queue changes to commit."
          else
            git commit -m "Build API player mapping verification queue"
            git push
          fi
