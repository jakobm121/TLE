name: TLE 07 Import API Results

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Optional start date YYYY-MM-DD"
        required: false
        default: ""
      end_date:
        description: "Optional end date YYYY-MM-DD"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  import-api-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Import API raw results
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            ARGS="$ARGS --start-date ${{ github.event.inputs.start_date }}"
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          python -m tle_machine.import_api_results $ARGS

      - name: Commit API source and reports
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/source/api_tennis/*.jsonl.gz || true
          git add data/source/api_tennis/manifest.json || true
          git add data/reports/api_tennis/import_api_results_report.json || true
          git add data/reports/api_tennis/skipped_api_matches.csv || true
          git add data/reports/api_tennis/duplicate_api_matches.csv || true
          git add data/reports/api_tennis/api_field_audit.json || true

          if git diff --cached --quiet; then
            echo "No API import changes to commit."
          else
            git commit -m "Import API tennis results"
            git push
          fi
