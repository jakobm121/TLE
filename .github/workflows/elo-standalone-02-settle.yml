name: Elo Standalone 02 Settle

on:
  workflow_dispatch:
    inputs:
      results_source:
        description: "Ai tennis_results.json URL"
        required: false
        default: "https://raw.githubusercontent.com/jakobm121/Ai/refs/heads/main/data/tennis_results.json"

permissions:
  contents: write

jobs:
  elo-standalone-settle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TLE repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Settle standalone Elo predictions
        run: |
          python -m tle_machine.elo_standalone_settle \
            --results-source "${{ github.event.inputs.results_source }}"

      - name: Commit standalone Elo settle
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/elo_standalone/predictions.json || true
          git add data/elo_standalone/results.json || true
          git add data/elo_standalone/active_predictions.csv || true
          git add data/elo_standalone/results.csv || true
          git add data/elo_standalone/results.md || true
          git add data/reports/elo_standalone/settle_report.json || true

          if git diff --cached --quiet; then
            echo "No standalone Elo settle changes to commit."
          else
            git commit -m "Settle standalone Elo predictions"
            git push
          fi
