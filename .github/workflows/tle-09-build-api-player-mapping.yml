name: TLE 09 Build API Player Mapping

on:
  workflow_dispatch:
    inputs:
      rebuild_auto_mapping:
        description: "Clean rebuild: ignore existing player_mapping.json, keep overrides if present"
        required: false
        default: "false"
      api_player_cache:
        description: "Optional API player cache path"
        required: false
        default: "data/raw/api_tennis/players/api_players.json"

permissions:
  contents: write

jobs:
  build-api-player-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build API player mapping
        run: |
          ARGS=""

          if [ "${{ github.event.inputs.rebuild_auto_mapping }}" = "true" ]; then
            ARGS="$ARGS --rebuild-auto-mapping"
          fi

          if [ -n "${{ github.event.inputs.api_player_cache }}" ]; then
            ARGS="$ARGS --api-player-cache ${{ github.event.inputs.api_player_cache }}"
          fi

          python -m tle_machine.build_api_player_mapping $ARGS

      - name: Commit mapping outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/metadata/api_tennis/player_mapping.json || true
          git add data/reports/api_tennis/player_mapping_report.json || true
          git add data/reports/api_tennis/player_mapping_candidates.csv || true
          git add data/reports/api_tennis/player_mapping_issues.csv || true

          if git diff --cached --quiet; then
            echo "No API player mapping changes to commit."
          else
            git commit -m "Build API player mapping"
            git push
          fi
