name: TLE 09 Build API Player Mapping

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-api-player-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build API player mapping
        run: |
          python -m tle_machine.build_api_player_mapping

      - name: Commit API player mapping
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/metadata/api_tennis/player_mapping.json || true
          git add data/metadata/api_tennis/player_mapping_overrides.json || true
          git add data/reports/api_tennis/player_mapping_report.json || true
          git add data/reports/api_tennis/player_mapping_review.csv || true
          git add data/reports/api_tennis/player_mapping_candidates.csv || true
          git add data/reports/api_tennis/player_mapping_issues.csv || true

          if git diff --cached --quiet; then
            echo "No API player mapping changes to commit."
          else
            git commit -m "Build API player mapping"
            git push
          fi
